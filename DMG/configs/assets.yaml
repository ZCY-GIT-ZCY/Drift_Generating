####################################
# DMG: 资源路径配置文件
####################################

# 实验文件保存路径
FOLDER: './experiments'

# 测试文件保存路径
TEST:
  FOLDER: './results'

####################################
# 数据集路径
# 注意：相对于 DMG 目录（DMG/）
# 完整结构：
#   Motion_Generating/
#   └── DMG/
#       └── datasets/
#           └── humanml3d/
#               ├── Mean.npy
#               ├── Std.npy
#               ├── train.txt
#               ├── val.txt
#               ├── test.txt
#               ├── new_joint_vecs/
#               └── texts/
####################################
DATASET:
  SMPL_PATH: './deps/smpl'
  TRANSFORM_PATH: './deps/transforms/'
  WORD_VERTILIZER_PATH: './deps/t2m/glove/'
  KIT:
    ROOT: './datasets/kit-ml'
    SPLIT_ROOT: './datasets/kit-ml'
  HUMANML3D:
    ROOT: './datasets/humanml3d'
    SPLIT_ROOT: './datasets/humanml3d'
  HUMANACT12:
    ROOT: './datasets/HumanAct12Poses'
    SPLIT_ROOT: './datasets/HumanAct12Poses'

####################################
# 预训练模型路径
####################################
model:
  # CLIP 文本编码器
  clip_path: './deps/clip-vit-large-patch14'
  # BERT 文本编码器
  bert_path: './deps/distilbert-base-uncased'
  # T2M 评估器
  t2m_path: './deps/t2m/'
  # MLD 预训练 VAE
  mld_vae_path: './pretrained_models/mld_vae_humanml3d.ckpt'

####################################
# Bank 数据路径
####################################
BANK:
  DATA_DIR: './data'
  BANK_PATH: './data/motion_drift_bank.pkl'

####################################
# 渲染设置
####################################
RENDER:
  BLENDER_PATH: '/usr/local/blender'
  FOLDER: './animations'
